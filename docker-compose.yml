version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ragkb-postgres
    environment:
      POSTGRES_DB: ragkb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: ragkb-api
    env_file:
      - .env
    depends_on:
      - postgres
    volumes:
      - ./:/app
      - ./uploads:/app/uploads
    ports:
      - "8000:8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
